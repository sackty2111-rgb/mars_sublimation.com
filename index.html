<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MARS SUBLIMATION Order & Invoice</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
      body {
        background: #0f172a;
      }
    </style>
  </head>
  <body class="min-h-screen text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useMemo } = React;
      const { jsPDF } = window.jspdf;

      const formatCurrency = (value) =>
        "RM " + Number(value || 0).toFixed(2);

      const formatInlinePrice = (value) =>
        value > 0 ? `(+RM ${Number(value).toFixed(2)})` : "(+RM 0.00)";

      const padNumber = (num, length = 4) =>
        String(num).padStart(length, "0");

      const getTodayDateStr = () => {
        const d = new Date();
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        return `${yyyy}${mm}${dd}`;
      };

      const getDisplayDate = () => {
        const d = new Date();
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        return `${dd}/${mm}/${yyyy}`;
      };

      const DEFAULT_PRICING = {
        baseTiers: [
          { minQty: 10, maxQty: 10, price: 36 },
          { minQty: 11, maxQty: 100, price: 34 },
          { minQty: 101, maxQty: 200, price: 32 },
          { minQty: 201, maxQty: 300, price: 30 },
        ],
        overrideBasePrice: "",
        addons: {
          longSleeve: 4,
          neckPremium: 2,
          size2xl4xl: 2,
          size5xl7xl: 3,
          nameLogoNumber: 4,
        },
      };

      const ADULT_SIZES = [
        { value: "XS", label: "XS (+RM 0.00)", surchargeType: "none" },
        { value: "S", label: "S (+RM 0.00)", surchargeType: "none" },
        { value: "M", label: "M (+RM 0.00)", surchargeType: "none" },
        { value: "L", label: "L (+RM 0.00)", surchargeType: "none" },
        { value: "XL", label: "XL (+RM 0.00)", surchargeType: "none" },
        { value: "2XL", label: "2XL (+RM 2.00)", surchargeType: "2xl4xl" },
        { value: "3XL", label: "3XL (+RM 2.00)", surchargeType: "2xl4xl" },
        { value: "4XL", label: "4XL (+RM 2.00)", surchargeType: "2xl4xl" },
        { value: "5XL", label: "5XL (+RM 3.00)", surchargeType: "5xl7xl" },
        { value: "6XL", label: "6XL (+RM 3.00)", surchargeType: "5xl7xl" },
        { value: "7XL", label: "7XL (+RM 3.00)", surchargeType: "5xl7xl" },
      ];

      const KID_SIZES = [
        "22",
        "24",
        "26",
        "28",
        "30",
        "32",
      ].map((v) => ({ value: v, label: `${v} (+RM 0.00)` }));

      const NECK_OPTIONS = [
        {
          value: "Round Neck",
          label: "Round Neck (+RM 0.00)",
          premium: false,
          audience: "Adult",
        },
        {
          value: "V Neck",
          label: "V Neck (+RM 0.00)",
          premium: false,
          audience: "Adult",
        },
        {
          value: "Round Neck (Kids)",
          label: "Round Neck (Kids) (+RM 0.00)",
          premium: false,
          audience: "Kid",
        },
        {
          value: "V Neck (Kids)",
          label: "V Neck (Kids) (+RM 0.00)",
          premium: false,
          audience: "Kid",
        },
        {
          value: "Mandarin Collar",
          label: "Mandarin Collar (+RM 2.00)",
          premium: true,
          audience: "Adult",
        },
        {
          value: "Raglan Round Neck",
          label: "Raglan Round Neck (+RM 2.00)",
          premium: true,
          audience: "Adult",
        },
        {
          value: "Collar With Button",
          label: "Collar With Button (+RM 2.00)",
          premium: true,
          audience: "Adult",
        },
        {
          value: "Retro V Collar",
          label: "Retro V Collar (+RM 2.00)",
          premium: true,
          audience: "Adult",
        },
        {
          value: "Retro Flat Collar",
          label: "Retro Flat Collar (+RM 2.00)",
          premium: true,
          audience: "Adult",
        },
        {
          value: "NFL Oversize",
          label: "NFL Oversize (+RM 2.00)",
          premium: true,
          audience: "Adult",
        },
      ];

      const SLEEVE_OPTIONS = [
        { value: "Short Sleeve", label: "Short Sleeve (+RM 0.00)" },
        { value: "Sleeveless", label: "Sleeveless (+RM 0.00)" },
        { value: "Long Sleeve", label: "Long Sleeve (+RM 4.00)" },
      ];

      const FABRICS = [
        {
          value: "Microfiber Eyelet 160gsm",
          label: "Microfiber Eyelet 160gsm (+RM 0.00)",
        },
        {
          value: "Microfiber Super Square 160gsm",
          label: "Microfiber Super Square 160gsm (+RM 0.00)",
        },
      ];

      const VDP_OPTIONS = [
        { value: "None", label: "None" },
        { value: "Numbering", label: "Numbering" },
        { value: "Text", label: "Text" },
        { value: "Numbering + Text", label: "Numbering + Text" },
      ];

      const createEmptyItem = () => ({
        audience: "Adult",
        fabric: FABRICS[0].value,
        neck: NECK_OPTIONS.find((n) => n.audience === "Adult").value,
        sleeve: "Short Sleeve",
        size: ADULT_SIZES[0].value,
        vdp: "None",
        nameLogoNumber: false,
        quantity: 10,
      });

      function App() {
        const [adminMode, setAdminMode] = useState(false);
        const [pricing, setPricing] = useState({ ...DEFAULT_PRICING });
        const [items, setItems] = useState([createEmptyItem()]);
        const [customer, setCustomer] = useState({
          name: "",
          phone: "",
          email: "",
          address: "",
        });
        const [adminDiscount, setAdminDiscount] = useState(0);
        const [invoiceCounter, setInvoiceCounter] = useState(1);
        const [errors, setErrors] = useState([]);
        const [invoiceHistory, setInvoiceHistory] = useState([]);
        const [logoBase64, setLogoBase64] = useState(null); // Added Logo State

        const todayStr = useMemo(() => getTodayDateStr(), []);
        const invoiceNumber = useMemo(
          () => `INV-${todayStr}-${padNumber(invoiceCounter, 4)}`,
          [todayStr, invoiceCounter]
        );

        const totalQuantity = useMemo(
          () =>
            items.reduce(
              (sum, item) => sum + (Number(item.quantity) || 0),
              0
            ),
          [items]
        );

        const totalLongSleeveQuantity = useMemo(
          () =>
            items.reduce(
              (sum, item) =>
                item.sleeve === "Long Sleeve"
                  ? sum + (Number(item.quantity) || 0)
                  : sum,
              0
            ),
          [items]
        );

        const basePricePerPiece = useMemo(() => {
          if (adminMode && pricing.overrideBasePrice) {
            return Number(pricing.overrideBasePrice);
          }
          const qty = totalQuantity;
          const tier = pricing.baseTiers.find(
            (t) => qty >= t.minQty && qty <= t.maxQty
          );
          return tier ? tier.price : 0;
        }, [pricing, totalQuantity, adminMode]);

        const lineItems = useMemo(() => {
          return items.map((item) => {
            const qty = Number(item.quantity) || 0;
            const base = basePricePerPiece;

            const neckDef = NECK_OPTIONS.find(
              (n) => n.value === item.neck
            );
            const neckPremium =
              neckDef && neckDef.premium
                ? pricing.addons.neckPremium
                : 0;

            const longSleeveAddon =
              item.sleeve === "Long Sleeve"
                ? pricing.addons.longSleeve
                : 0;

            let sizeAddon = 0;
            const sizeDef = ADULT_SIZES.find(
              (s) => s.value === item.size
            );
            if (item.audience === "Adult" && sizeDef) {
              if (sizeDef.surchargeType === "2xl4xl") {
                sizeAddon = pricing.addons.size2xl4xl;
              } else if (sizeDef.surchargeType === "5xl7xl") {
                sizeAddon = pricing.addons.size5xl7xl;
              }
            }

            const nlnAddon = item.nameLogoNumber
              ? pricing.addons.nameLogoNumber
              : 0;

            const addonPerPiece =
              Number(neckPremium) +
              Number(longSleeveAddon) +
              Number(sizeAddon) +
              Number(nlnAddon);

            const unitPrice = base + addonPerPiece;
            const rowTotal = unitPrice * qty;

            return {
              ...item,
              qty,
              base,
              neckPremium,
              longSleeveAddon,
              sizeAddon,
              nlnAddon,
              addonPerPiece,
              unitPrice,
              rowTotal,
            };
          });
        }, [items, basePricePerPiece, pricing]);

        const subtotal = useMemo(
          () =>
            lineItems.reduce(
              (sum, li) => sum + (li.rowTotal || 0),
              0
            ),
          [lineItems]
        );

        const grandTotal = useMemo(() => {
          const disc = Number(adminDiscount) || 0;
          const raw = subtotal - disc;
          return raw < 0 ? 0 : raw;
        }, [subtotal, adminDiscount]);

        const validationErrors = useMemo(() => {
          const errs = [];
          if (!adminMode) {
            if (totalQuantity < 10) {
              errs.push(
                "Minimum Order Quantity (MOQ) is 10 pieces."
              );
            }
            if (
              totalLongSleeveQuantity > 0 &&
              totalLongSleeveQuantity < 10
            ) {
              errs.push(
                "Long Sleeve minimum is 10 pieces if any long sleeve is ordered."
              );
            }
          }
          if (basePricePerPiece <= 0) {
            errs.push(
              "Base price tier is invalid for the current total quantity."
            );
          }
          if (!customer.name.trim()) {
            errs.push("Customer name is required.");
          }
          if (!customer.phone.trim()) {
            errs.push("Customer phone is required.");
          }
          if (!customer.address.trim()) {
            errs.push("Customer address is required.");
          }
          return errs;
        }, [
          totalQuantity,
          totalLongSleeveQuantity,
          basePricePerPiece,
          adminMode,
          customer,
        ]);

        React.useEffect(() => {
          setErrors(validationErrors);
        }, [validationErrors]);

        const handleCustomerChange = (field, value) => {
          setCustomer((prev) => ({ ...prev, [field]: value }));
        };

        const handleItemChange = (index, field, value) => {
          setItems((prev) => {
            const next = [...prev];
            let updated = { ...next[index], [field]: value };

            if (field === "audience") {
              const audience = value;
              const neckDef = NECK_OPTIONS.find(
                (n) => n.audience === audience
              );
              if (neckDef) {
                updated.neck = neckDef.value;
              }
              if (audience === "Adult") {
                updated.size = ADULT_SIZES[0].value;
              } else {
                updated.size = KID_SIZES[0].value;
              }
            }

            next[index] = updated;
            return next;
          });
        };

        const addItem = () => {
          setItems((prev) => [...prev, createEmptyItem()]);
        };

        const removeItem = (index) => {
          setItems((prev) =>
            prev.length <= 1
              ? prev
              : prev.filter((_, i) => i !== index)
          );
        };

        const handlePricingChange = (section, field, value) => {
          setPricing((prev) => {
            if (section === "base") {
              return {
                ...prev,
                overrideBasePrice: value,
              };
            }
            if (section === "addons") {
              return {
                ...prev,
                addons: {
                  ...prev.addons,
                  [field]: Number(value) || 0,
                },
              };
            }
            return prev;
          });
        };

        // --- NEW: Handle Image Upload ---
        const handleLogoUpload = (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
              setLogoBase64(event.target.result);
            };
            reader.readAsDataURL(file);
          }
        };

        const handleGeneratePdf = () => {
          if (errors.length > 0) {
            alert(
              "Please resolve all validation errors before generating the invoice."
            );
            return;
          }
          if (totalQuantity <= 0) {
            alert("Please enter at least one line item.");
            return;
          }

          const doc = new jsPDF({
            orientation: "portrait",
            unit: "pt",
            format: "a4",
          });

          const pageWidth = doc.internal.pageSize.getWidth();
          const pageHeight = doc.internal.pageSize.getHeight();
          const margin = 50;
          const contentWidth = pageWidth - margin * 2;

          let cursorY = margin;

          const ensureSpace = (heightNeeded, addPageForHeader) => {
            if (cursorY + heightNeeded > pageHeight - margin) {
              doc.addPage();
              cursorY = margin;
              if (addPageForHeader) {
                drawTableHeader();
              }
            }
          };

          // --- LOGO OR TEXT HEADER ---
          if (logoBase64) {
            try {
              const imgProps = doc.getImageProperties(logoBase64);
              const pdfWidth = 140; // Max width for logo
              const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
              doc.addImage(logoBase64, imgProps.fileType || 'PNG', margin, cursorY, pdfWidth, pdfHeight);
              cursorY += pdfHeight + 15; // Push text down dynamically below logo
            } catch (e) {
              // Fallback if image load fails for any reason
              doc.setFont("helvetica", "bold");
              doc.setFontSize(20);
              doc.text("MARS SUBLIMATION", margin, cursorY);
              cursorY += 20;
            }
          } else {
            doc.setFont("helvetica", "bold");
            doc.setFontSize(20);
            doc.text("MARS SUBLIMATION", margin, cursorY);
            cursorY += 20;
          }
          
          // --- ADDRESS AND PHONE ---
          doc.setFont("helvetica", "normal");
          doc.setFontSize(10);
          doc.text("Operated under BIGG MARS ENTERPRISE", margin, cursorY);
          cursorY += 14;
          
          doc.setFontSize(9);
          doc.text("NO.10 TINGKAT 1 & 2, JALAN USAHAWAN 4", margin, cursorY);
          cursorY += 12;
          doc.text("PUSAT PERNIAGAAN KOMPLEKS DATO KALIAN", margin, cursorY);
          cursorY += 12;
          doc.text("13200 KEPALA BATAS, PULAU PINANG", margin, cursorY);
          cursorY += 12;
          doc.text("Phone: 010 916 7230", margin, cursorY); // UPDATED PHONE

          // --- TOP RIGHT INVOICE DETAILS ---
          // Drawn relative to margin so they align perfectly at top right
          const rightX = pageWidth - margin;
          doc.setFontSize(11);
          doc.text(`Invoice No: ${invoiceNumber}`, rightX, margin + 5, { align: "right" });
          doc.text(`Date: ${getDisplayDate()}`, rightX, margin + 19, { align: "right" });
          doc.text("Status: PENDING PAYMENT", rightX, margin + 33, { align: "right" });

          // Ensure enough vertical space before Bill To section
          cursorY = Math.max(cursorY + 30, margin + 70); 

          doc.setFont("helvetica", "bold");
          doc.setFontSize(12);
          doc.text("Bill To:", margin, cursorY);
          doc.setFont("helvetica", "normal");
          doc.setFontSize(11);
          const billLines = [
            customer.name,
            `Phone: ${customer.phone}`,
            customer.email ? `Email: ${customer.email}` : "",
            customer.address,
          ].filter(Boolean);

          cursorY += 16;
          billLines.forEach((line) => {
            const wrapped = doc.splitTextToSize(
              line,
              contentWidth / 2
            );
            doc.text(wrapped, margin, cursorY);
            cursorY += wrapped.length * 14;
          });

          cursorY += 10;

          const colWidths = {
            desc: contentWidth * 0.26,
            specs: contentWidth * 0.26,
            sizeSleeve: contentWidth * 0.17,
            qty: contentWidth * 0.07,
            unit: contentWidth * 0.11,
            total: contentWidth * 0.13,
          };

          const drawTableHeader = () => {
            doc.setFont("helvetica", "bold");
            doc.setFontSize(10);
            const headerHeight = 20;

            doc.rect(
              margin,
              cursorY,
              contentWidth,
              headerHeight
            );

            let x = margin;
            const headers = [
              "Description",
              "Specs",
              "Size & Sleeve",
              "Qty",
              "Unit (RM)",
              "Total (RM)",
            ];
            const widths = [
              colWidths.desc,
              colWidths.specs,
              colWidths.sizeSleeve,
              colWidths.qty,
              colWidths.unit,
              colWidths.total,
            ];

            headers.forEach((h, i) => {
              const w = widths[i];
              doc.text(h, x + 4, cursorY + 13);
              x += w;
            });

            cursorY += headerHeight;
          };

          drawTableHeader();

          doc.setFont("helvetica", "normal");
          doc.setFontSize(9);

          const drawRow = (li) => {
            const desc = `Custom Sublimation Jersey - ${li.fabric}`;
            const specsParts = [
              `Neck: ${li.neck}`,
              `VDP: ${li.vdp}`,
              `Name+Logo+Number: ${
                li.nameLogoNumber ? "Yes" : "No"
              }`,
            ];
            const specs = specsParts.join(" | ");
            const sizeSleeve = `${li.audience} ${li.size} - ${li.sleeve}`;
            const qtyStr = String(li.qty);
            const unitStr = li.unitPrice.toFixed(2);
            const totalStr = li.rowTotal.toFixed(2);

            const lineSpacing = 12;

            const descLines = doc.splitTextToSize(
              desc,
              colWidths.desc - 8
            );
            const specsLines = doc.splitTextToSize(
              specs,
              colWidths.specs - 8
            );
            const sizeLines = doc.splitTextToSize(
              sizeSleeve,
              colWidths.sizeSleeve - 8
            );

            const numLines = Math.max(
              descLines.length,
              specsLines.length,
              sizeLines.length
            );

            const rowHeight = numLines * lineSpacing + 8;

            ensureSpace(rowHeight, true);

            doc.rect(
              margin,
              cursorY,
              contentWidth,
              rowHeight
            );

            let x = margin;

            const drawCellText = (textLines, width) => {
              let innerY = cursorY + 6 + lineSpacing;
              textLines.forEach((t) => {
                doc.text(
                  t,
                  x + 4,
                  innerY
                );
                innerY += lineSpacing;
              });
              x += width;
            };

            drawCellText(descLines, colWidths.desc);
            drawCellText(specsLines, colWidths.specs);
            drawCellText(sizeLines, colWidths.sizeSleeve);

            let innerY = cursorY + 6 + lineSpacing;
            doc.text(
              qtyStr,
              x + colWidths.qty / 2,
              innerY,
              { align: "center" }
            );
            x += colWidths.qty;

            doc.text(
              unitStr,
              x + colWidths.unit - 6,
              innerY,
              { align: "right" }
            );
            x += colWidths.unit;

            doc.text(
              totalStr,
              x + colWidths.total - 6,
              innerY,
              { align: "right" }
            );

            cursorY += rowHeight;
          };

          lineItems.forEach(drawRow);

          cursorY += 20;

          ensureSpace(110, false);

          const summaryTableWidth = contentWidth * 0.4;
          const summaryX = margin + contentWidth - summaryTableWidth;
          const summaryRowHeight = 18;

          const drawSummaryRow = (label, value, isBold) => {
            doc.rect(
              summaryX,
              cursorY,
              summaryTableWidth,
              summaryRowHeight
            );
            doc.setFont(
              "helvetica",
              isBold ? "bold" : "normal"
            );
            doc.setFontSize(isBold ? 11 : 10);
            doc.text(
              label,
              summaryX + 6,
              cursorY + 12
            );
            doc.text(
              value,
              summaryX + summaryTableWidth - 6,
              cursorY + 12,
              { align: "right" }
            );
            cursorY += summaryRowHeight;
          };

          doc.setFont("helvetica", "bold");
          doc.setFontSize(11);
          drawSummaryRow(
            "Subtotal (RM)",
            subtotal.toFixed(2),
            false
          );

          const discountVal = Number(adminDiscount) || 0;
          if (discountVal > 0) {
            drawSummaryRow(
              "Discount (RM)",
              `- ${discountVal.toFixed(2)}`,
              false
            );
          }

          drawSummaryRow(
            "Grand Total (RM)",
            grandTotal.toFixed(2),
            true
          );

          if (grandTotal > 300) {
            const deposit = grandTotal * 0.5;
            const balance = grandTotal - deposit;
            drawSummaryRow(
              "Deposit 50% Due Now (RM)",
              deposit.toFixed(2),
              true
            );
            drawSummaryRow(
              "Balance Before Delivery (RM)",
              balance.toFixed(2),
              false
            );
          }

          cursorY += 20;
          ensureSpace(120, false);

          doc.setFont("helvetica", "bold");
          doc.setFontSize(12);
          doc.text("Payment Instructions", margin, cursorY);
          cursorY += 16;

          doc.setFont("helvetica", "normal");
          doc.setFontSize(10);
          const paymentLines = [
            "Bank: RHB",
            "Account Name: BIGG MARS ENTERPRISE",
            "Account Number: 20206900062479",
          ];

          paymentLines.forEach((line) => {
            doc.text(line, margin, cursorY);
            cursorY += 14;
          });

          cursorY += 10;

          ensureSpace(120, false);

          doc.setFont("helvetica", "bold");
          doc.setFontSize(12);
          doc.text("Terms & Conditions", margin, cursorY);
          cursorY += 16;

          doc.setFont("helvetica", "normal");
          doc.setFontSize(10);
          const tcLines = [
            'Processing Time: "Estimated completion: 10 working days from payment confirmation."',
            'Manufacturing Tolerance: "T-Shirt Size Dimension Tolerance: +/- 2 Inches."',
            "For invoices above RM 300.00, a 50% deposit is required upon confirmation and the remaining 50% is due at least 1 week before delivery.",
          ];

          tcLines.forEach((line) => {
            const wrapped = doc.splitTextToSize(
              line,
              contentWidth
            );
            ensureSpace(wrapped.length * 12 + 4, false);
            doc.text(wrapped, margin, cursorY);
            cursorY += wrapped.length * 12 + 4;
          });

          cursorY += 18;
          ensureSpace(40, false);

          doc.setFont("helvetica", "bold");
          doc.setFontSize(11);
          const thanks =
            "Thank you for choosing MARS SUBLIMATION! We appreciate your business and look forward to outfitting your team.";
          const thanksLines = doc.splitTextToSize(
            thanks,
            contentWidth
          );
          doc.text(thanksLines, margin, cursorY);

          const fileName = `${invoiceNumber}.pdf`;
          doc.save(fileName);

          setInvoiceHistory((prev) => [
            {
              id: invoiceNumber,
              date: getDisplayDate(),
              customer: customer.name,
              total: grandTotal.toFixed(2),
            },
            ...prev,
          ]);

          setInvoiceCounter((prev) => prev + 1);
        };

        return (
          <div className="max-w-6xl mx-auto py-8 px-4 space-y-6">
            <header className="bg-slate-900/80 border border-slate-700 rounded-xl p-6 shadow-lg shadow-slate-900/60">
              <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div>
                  <h1 className="text-2xl md:text-3xl font-bold tracking-tight text-sky-300">
                    MARS SUBLIMATION
                  </h1>
                  <p className="text-sm text-slate-300">
                    Operated under BIGG MARS ENTERPRISE
                  </p>
                  <p className="mt-1 text-slate-400 text-sm">
                    Custom sublimation jerseys with transparent, mix-and-match pricing.

                  <div className="border-t border-slate-800 my-2" />
                  <div className="flex justify-between">
                    <span className="text-slate-300">Subtotal</span>
                    <span className="font-semibold text-slate-100">
                      {formatCurrency(subtotal)}
                    </span>
                  </div>
                  <div className="flex justify-between text-xs">
                    <span className="text-slate-300">
                      Discount (Admin)
                    </span>
                    <span className="font-semibold text-rose-300">
                      - {formatCurrency(adminDiscount || 0)}
                    </span>
                  </div>
                  <div className="border-t border-slate-800 my-2" />
                  <div className="flex justify-between items-center">
                    <span className="text-slate-100 font-semibold">
                      Grand Total
                    </span>
                    <span className="font-bold text-xl text-emerald-300">
                      {formatCurrency(grandTotal)}
                    </span>
                  </div>
                  {grandTotal > 300 && (
                    <p className="mt-1 text-[11px] text-amber-300">
                      For invoices above RM 300.00, a 50% deposit is
                      required upon confirmation and the remaining 50%
                      is due at least 1 week before delivery.
                    </p>
                  )}
                </div>
              </div>

              <div className="space-y-3">
                <h2 className="text-lg font-semibold text-slate-100">
                  Invoice & Export
                </h2>

                {/* --- ADDED LOGO UPLOADER HERE --- */}
                <div className="space-y-3 mb-4">
                  <label className="block text-xs text-slate-300">
                    Invoice Logo (Optional)
                    <input
                      type="file"
                      accept="image/*"
                      onChange={handleLogoUpload}
                      className="mt-1 block w-full text-xs text-slate-400 file:mr-4 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-sky-500/20 file:text-sky-300 hover:file:bg-sky-500/30"
                    />
                  </label>
                  {logoBase64 && (
                    <div className="mt-2">
                      <img src={logoBase64} alt="Logo preview" className="h-12 object-contain bg-slate-800 rounded p-1" />
                    </div>
                  )}
                </div>

                {errors.length > 0 && (
                  <div className="rounded-md border border-rose-500/60 bg-rose-900/40 p-3 text-xs text-rose-50 space-y-1 max-h-40 overflow-auto">
                    <p className="font-semibold">
                      Please fix the following before generating the
                      invoice:
                    </p>
                    <ul className="list-disc list-inside space-y-0.5">
                      {errors.map((e, i) => (
                        <li key={i}>{e}</li>
                      ))}
                    </ul>
                  </div>
                )}

                <div className="text-xs text-slate-400 space-y-1">
                  <p>
                    The PDF invoice will include all line items,
                    pricing breakdown, payment instructions, deposit
                    rules, and terms & conditions.
                  </p>
                  <p>
                    File name format:{" "}
                    <span className="font-mono text-slate-200">
                      INV-YYYYMMDD-XXXX.pdf
                    </span>
                  </p>
                </div>

                <button
                  type="button"
                  onClick={handleGeneratePdf}
                  className="w-full inline-flex justify-center items-center rounded-md bg-emerald-500 px-4 py-2.5 text-sm font-semibold text-slate-950 shadow-md shadow-emerald-500/40 hover:bg-emerald-400 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:ring-offset-2 focus:ring-offset-slate-900 disabled:opacity-50 disabled:cursor-not-allowed"
                >
                  Generate PDF Invoice
                </button>
              </div>
            </section>

            {invoiceHistory.length > 0 && (
              <section className="bg-slate-900/80 border border-slate-700 rounded-xl p-6 shadow-lg shadow-slate-900/60 space-y-4 mt-6">
                <h2 className="text-lg font-semibold text-slate-100">
                  Invoice History
                </h2>
                <div className="overflow-hidden rounded-lg border border-slate-700 bg-slate-950/60">
                  <table className="min-w-full text-sm text-left">
                    <thead className="bg-slate-800/80 text-slate-200">
                      <tr>
                        <th className="px-3 py-2">Invoice No</th>
                        <th className="px-3 py-2">Date</th>
                        <th className="px-3 py-2">Customer</th>
                        <th className="px-3 py-2 text-right">Total (RM)</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-800 text-slate-300">
                      {invoiceHistory.map((inv, idx) => (
                        <tr key={idx}>
                          <td className="px-3 py-2 font-mono">{inv.id}</td>
                          <td className="px-3 py-2">{inv.date}</td>
                          <td className="px-3 py-2">{inv.customer}</td>
                          <td className="px-3 py-2 text-right font-semibold text-emerald-300">
                            {inv.total}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </section>
            )}

            <footer className="pb-6 text-[11px] text-center text-slate-500">
              <p>
                Custom Jersey Order & Invoice System for MARS SUBLIMATION –
                all pricing computed dynamically in-browser.
              </p>
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
